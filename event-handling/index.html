<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Handling Demo</title>
  <link rel="stylesheet" href="style.css" />
 </head>
 <body>
  <div class="container">
   <h1>Event Handling Demo</h1>

   <div class="card">
    <h2>Click Event</h2>
    <button id="clickBtn">Click Me</button>
   </div>

   <div class="card">
    <h2>Input & Change Event</h2>
    <input type="text" id="textInput" placeholder="Tulis apa saja..." />
    <select id="selectBox">
     <option value="">-- Pilih opsi --</option>
     <option value="HTML">HTML</option>
     <option value="CSS">CSS</option>
     <option value="JavaScript">JavaScript</option>
    </select>
   </div>

   <div class="card">
    <h2>Event Form Submit</h2>
    <form id="myForm">
     <input type="text" id="formInput" placeholder="Masukkan Namamu..." />
     <button type="submit">Submit</button>
    </form>
   </div>

   <div class="card">
    <h2>Keyup Event</h2>
    <input type="text" id="keyInput" placeholder="Tekan key apapun..." />
   </div>

   <div class="card">
    <h2>Mouseover & Mouseout Event</h2>
    <div id="hoverBox">Hover disini!</div>
   </div>

   <div class="card">
    <h2>Focus & Blur Event</h2>
    <input type="text" id="focusInput" placeholder="Tekan ini untuk fokus..." />
   </div>

   <div class="output-area">
    <h2>Output:</h2>
    <div id="output"></div>
   </div>
  </div>

  <script src="script.js"></script>
 </body>
</html>
